name: CortexOS
options:
  bundleIdPrefix: com.cortexos
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CortexOS-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: iOS
        excludes:
          - "**/.DS_Store"
    info:
      path: iOS/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cortexos.app
        PRODUCT_NAME: CortexOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule

  CortexOS-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: macOS
        excludes:
          - "**/.DS_Store"
    info:
      path: macOS/Info.plist
    entitlements:
      path: macOS/CortexOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cortexos.app.mac
        PRODUCT_NAME: CortexOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: macOS/CortexOS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule

schemes:
  CortexOS-iOS:
    build:
      targets:
        CortexOS-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

  CortexOS-macOS:
    build:
      targets:
        CortexOS-macOS: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
