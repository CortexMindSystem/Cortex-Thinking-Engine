name: CortexOS
options:
  bundleIdPrefix: me.ph7.cortexos
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "7"
    DEVELOPMENT_TEAM: 2V8LZ2444Y
    CODE_SIGN_STYLE: Automatic

targets:
  CortexOS-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: iOS
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CortexOS-Widget
    info:
      path: iOS/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: iOS/CortexOS-iOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.ph7.cortexos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.cortexos.ios
        PRODUCT_NAME: CortexOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule

  CortexOS-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: macOS
        excludes:
          - "**/.DS_Store"
    info:
      path: macOS/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.productivity
    entitlements:
      path: macOS/CortexOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.cortexos.macos
        PRODUCT_NAME: CortexOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: macOS/CortexOS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule

  CortexOS-Widget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget
        excludes:
          - "**/.DS_Store"
      - path: Shared/Models/WidgetData.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.cortexos.ios.widget
        PRODUCT_NAME: CortexOS-Widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_CFBundleDisplayName: CortexOS Focus
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        SKIP_INSTALL: YES
    entitlements:
      path: Widget/CortexOS-Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.ph7.cortexos
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: CortexOS Focus
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  CortexOS-iOS-UITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CortexOS-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.cortexos.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CortexOS-iOS

  CortexOS-macOS-UITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CortexOS-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.cortexos.macos.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CortexOS-macOS

schemes:
  CortexOS-iOS:
    build:
      targets:
        CortexOS-iOS: all
        CortexOS-Widget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CortexOS-iOS-UITests
    archive:
      config: Release

  CortexOS-macOS:
    build:
      targets:
        CortexOS-macOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CortexOS-macOS-UITests
    archive:
      config: Release
